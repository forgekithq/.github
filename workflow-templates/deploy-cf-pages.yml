name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [$default-branch]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: forgekithq/.github/.github/workflows/deploy-cf-pages.yml@main
    with:
      project-name: my-project  # Change to your Cloudflare Pages project name
    secrets: inherit
