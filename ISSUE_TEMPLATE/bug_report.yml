name: Bug Report
description: Report something that isn't working
labels: ["bug", "triage"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you using?
      placeholder: e.g. 1.2.3
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `npx envguard check`
        2. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help. Do not paste API keys, tokens, or secrets here.
    validations:
      required: false
